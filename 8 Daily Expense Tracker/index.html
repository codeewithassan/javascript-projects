<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #1f2937;
            --light: #f3f4f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: var(--dark);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .card h3 {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
        }

        .balance {
            color: var(--success);
        }

        .spent {
            color: var(--danger);
        }

        .currency-selector {
            margin-top: 10px;
        }

        .currency-btn {
            background: var(--light);
            border: 1px solid #d1d5db;
            padding: 5px 10px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .currency-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .progress-container {
            background: #e5e7eb;
            border-radius: 8px;
            height: 12px;
            width: 100%;
            margin: 20px 0 30px 0;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        #budget-progress {
            background: #16a34a;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .form-section,
        .list-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #4338ca;
        }

        .filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--light);
        }

        .filter-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .filter-controls select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
        }

        #reset-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        #reset-btn:hover {
            background: #b91c1c;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
        }

        th {
            background-color: var(--light);
            color: #4a5568;
            font-weight: 600;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        .no-data {
            text-align: center;
            color: #9ca3af;
            padding: 20px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Daily Expense Tracker</h1>

        <div class="dashboard">
            <div class="card">
                <h3>Total Balance (Budget: 50,000)</h3>
                <p class="balance" id="total-balance">PKR 50,000</p>
            </div>
            <div class="card">
                <h3>Total Spent</h3>
                <p class="spent" id="total-spent">PKR 0</p>
                <div class="currency-selector">
                    <button class="currency-btn active" onclick="changeCurrency('PKR')">PKR</button>
                    <button class="currency-btn" onclick="changeCurrency('USD')">USD</button>
                    <button class="currency-btn" onclick="changeCurrency('EUR')">EUR</button>
                </div>
            </div>
        </div>

        <div class="progress-container">
            <div id="budget-progress"></div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2 style="margin-bottom: 15px; font-size: 18px;">Add New Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="expense-name">Expense Name</label>
                        <input type="text" id="expense-name" placeholder="e.g., Biryani" required>
                    </div>
                    <div class="form-group">
                        <label for="expense-amount">Amount (PKR)</label>
                        <input type="number" id="expense-amount" min="1" placeholder="e.g., 500" required>
                    </div>
                    <div class="form-group">
                        <label for="expense-category">Category</label>
                        <select id="expense-category" required>
                            <option value="">Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Bills">Bills</option>
                            <option value="Entertainment">Entertainment</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Add Expense</button>
                </form>
            </div>

            <div class="list-section">
                <div class="filter-container">
                    <h2 style="font-size: 18px;">History</h2>
                    <div class="filter-controls">
                        <div>
                            <label for="category-filter" style="font-size: 14px; margin-right: 5px;">Filter:</label>
                            <select id="category-filter" onchange="filterExpenses()">
                                <option value="All">All Categories</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Entertainment">Entertainment</option>
                            </select>
                        </div>
                        <button id="reset-btn" onclick="resetApp()">Reset All</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                    <div id="no-data-msg" class="no-data">No expenses added yet.</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
